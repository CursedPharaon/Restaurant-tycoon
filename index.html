<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Ресторанный Магнат - 3D Бизнес Симулятор</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Segoe UI', 'Poppins', 'Montserrat', sans-serif;
        }
        
        /* Интерфейс поверх 3D */
        .ui-panel {
            position: absolute;
            bottom: 20px;
            left: 20px;
            right: 20px;
            background: rgba(0,0,0,0.75);
            backdrop-filter: blur(15px);
            border-radius: 28px;
            padding: 16px 24px;
            color: white;
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            gap: 15px;
            z-index: 10;
            border: 1px solid rgba(255,215,0,0.3);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            pointer-events: auto;
            font-weight: 500;
        }
        
        .stats {
            display: flex;
            gap: 25px;
            background: rgba(0,0,0,0.5);
            padding: 8px 18px;
            border-radius: 40px;
            font-size: 1.2rem;
        }
        
        .stat {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .stat span:first-child {
            font-size: 1.3rem;
        }
        
        .money {
            color: #ffd966;
            font-weight: bold;
            text-shadow: 0 0 5px rgba(0,0,0,0.5);
        }
        
        .level {
            color: #6ee7ff;
        }
        
        .phone-btn {
            background: #2c3e66;
            border: none;
            color: white;
            font-size: 1.8rem;
            padding: 10px 20px;
            border-radius: 60px;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            align-items: center;
            gap: 12px;
            box-shadow: 0 5px 0 #0f1a2e;
            font-weight: bold;
        }
        
        .phone-btn:active {
            transform: translateY(2px);
            box-shadow: 0 2px 0 #0f1a2e;
        }
        
        .modal {
            position: absolute;
            bottom: 100px;
            right: 20px;
            width: 320px;
            background: #1e1e2f;
            border-radius: 32px;
            padding: 20px;
            color: white;
            z-index: 20;
            backdrop-filter: blur(10px);
            background: rgba(30,30,47,0.95);
            border-left: 4px solid gold;
            box-shadow: 0 20px 35px black;
            transition: 0.2s;
            font-size: 0.9rem;
            pointer-events: auto;
        }
        
        .modal h3 {
            margin-top: 0;
            text-align: center;
            color: #ffcc66;
        }
        
        .modal button {
            width: 100%;
            background: #2c3e66;
            border: none;
            color: white;
            padding: 12px;
            margin: 8px 0;
            border-radius: 40px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.1s;
        }
        
        .modal button:active {
            background: #1e2b46;
        }
        
        .close-modal {
            background: #5a3e2b !important;
        }
        
        .resto-select {
            position: absolute;
            top: 30%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(12px);
            padding: 30px;
            border-radius: 48px;
            text-align: center;
            z-index: 30;
            border: 1px solid gold;
            min-width: 280px;
            pointer-events: auto;
        }
        
        .resto-select button {
            background: #ffb347;
            border: none;
            margin: 12px;
            padding: 12px 24px;
            border-radius: 60px;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
        }
        
        .notification {
            position: absolute;
            top: 20px;
            right: 20px;
            background: #2e7d64;
            padding: 12px 20px;
            border-radius: 40px;
            color: white;
            font-weight: bold;
            z-index: 25;
            transition: 0.3s;
            pointer-events: none;
            opacity: 0;
        }
        
        @keyframes fadeOut {
            0% { opacity: 1; transform: translateX(0);}
            100% { opacity: 0; transform: translateX(100px);}
        }
        
        @media (max-width: 700px) {
            .stats { font-size: 0.8rem; gap: 12px; padding: 5px 12px;}
            .phone-btn { padding: 6px 14px; font-size: 1.2rem;}
            .ui-panel { padding: 12px; flex-direction: column; align-items: stretch;}
        }
    </style>
</head>
<body>
    <div id="restoSelector" class="resto-select">
        <h2 style="color:white;">🍽️ ВЫБЕРИТЕ РЕСТОРАН</h2>
        <button id="selectPizza">🍕 Пиццерия</button>
        <button id="selectSushi">🍣 Суши-бар</button>
        <button id="selectBurger">🍔 Бургерная</button>
    </div>
    
    <div class="ui-panel">
        <div class="stats">
            <div class="stat">💰 <span id="moneyDisplay" class="money">5000</span> $</div>
            <div class="stat">⭐ <span id="levelDisplay" class="level">1</span> ур.</div>
            <div class="stat">👥 <span id="customersDisplay">0</span> гостей</div>
            <div class="stat">📈 <span id="incomePerSec">0</span> $/сек</div>
        </div>
        <button id="phoneButton" class="phone-btn">📱 МЕНЕДЖЕР</button>
    </div>
    
    <div id="phoneModal" class="modal" style="display: none;">
        <h3>📞 БИЗНЕС-ЦЕНТР</h3>
        <button id="upgradeLevelBtn">✨ Улучшить ресторан (Ур.2: 2500$)</button>
        <button id="orderSuppliesBtn">🚚 Заказать доставку ингредиентов (800$)</button>
        <button id="advertisingBtn">📢 Реклама (+30% гостей) (1200$)</button>
        <button id="sellBusinessBtn">💸 ПРОДАТЬ БИЗНЕС (+10000$)</button>
        <button id="closeModalBtn" class="close-modal">✖️ Закрыть</button>
    </div>
    
    <div id="notification" class="notification">✨ Событие</div>

    <!-- Загрузка Three.js и Pyodide -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js"
            }
        }
    </script>
    
    <script src="https://cdn.jsdelivr.net/pyodide/v0.26.1/full/pyodide.js"></script>
    <script type="module">
        import * as THREE from 'three';
        
        // ---------- 3D СЦЕНА - КРАСИВЫЙ РЕСТОРАН ИНТЕРЬЕР ----------
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x050b1a);
        scene.fog = new THREE.FogExp2(0x050b1a, 0.008);
        
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(5, 3.5, 6);
        camera.lookAt(0, 1, 0);
        
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true; // тени для красоты
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);
        
        // Освещение
        // Ambient
        const ambientLight = new THREE.AmbientLight(0x404060);
        scene.add(ambientLight);
        // Главный свет
        const mainLight = new THREE.DirectionalLight(0xfff5e0, 1.2);
        mainLight.position.set(4, 6, 3);
        mainLight.castShadow = true;
        mainLight.receiveShadow = true;
        scene.add(mainLight);
        // Заполняющий теплый
        const fillLight = new THREE.PointLight(0xccaa77, 0.5);
        fillLight.position.set(2, 3, 2);
        scene.add(fillLight);
        // Свет сзади
        const backLight = new THREE.PointLight(0x6688aa, 0.4);
        backLight.position.set(-2, 2, -3);
        scene.add(backLight);
        
        // Пол (деревянный)
        const floorMat = new THREE.MeshStandardMaterial({ color: 0x8b5a2b, roughness: 0.6, metalness: 0.1 });
        const floor = new THREE.Mesh(new THREE.PlaneGeometry(12, 10), floorMat);
        floor.rotation.x = -Math.PI / 2;
        floor.position.y = -0.05;
        floor.receiveShadow = true;
        scene.add(floor);
        
        // Декоративные плитки (ковровая дорожка)
        const runnerMat = new THREE.MeshStandardMaterial({ color: 0xb5651d, roughness: 0.4 });
        const runner = new THREE.Mesh(new THREE.BoxGeometry(3, 0.03, 6), runnerMat);
        runner.position.set(0, -0.02, -0.5);
        runner.receiveShadow = true;
        scene.add(runner);
        
        // Столы и стулья (создадим несколько)
        const tableMat = new THREE.MeshStandardMaterial({ color: 0xc9a87c, roughness: 0.3, metalness: 0.1 });
        const chairMat = new THREE.MeshStandardMaterial({ color: 0xd6b17e, roughness: 0.5 });
        const tablePositions = [
            [-2, 0, -1], [2, 0, -1], [-2.5, 0, 1.5], [2.5, 0, 1.5], [0, 0, 0.5], [-1, 0, 2.2], [1, 0, 2.2]
        ];
        tablePositions.forEach(pos => {
            const table = new THREE.Mesh(new THREE.CylinderGeometry(0.6, 0.7, 0.6, 24), tableMat);
            table.position.set(pos[0], pos[1] + 0.3, pos[2]);
            table.castShadow = true;
            table.receiveShadow = true;
            scene.add(table);
            // Стол-столешница
            const top = new THREE.Mesh(new THREE.CylinderGeometry(0.75, 0.75, 0.1, 24), new THREE.MeshStandardMaterial({ color: 0xe0b07a, roughness: 0.2 }));
            top.position.set(pos[0], pos[1] + 0.65, pos[2]);
            top.castShadow = true;
            scene.add(top);
            
            // стулья вокруг (по 2)
            const chairOffsets = [[0.6, 0.45], [-0.6, 0.45], [0.45, -0.6], [-0.45, -0.6]];
            chairOffsets.forEach(off => {
                const chair = new THREE.Mesh(new THREE.BoxGeometry(0.45, 0.45, 0.45), chairMat);
                chair.position.set(pos[0] + off[0], pos[1] + 0.22, pos[2] + off[1]);
                chair.castShadow = true;
                scene.add(chair);
            });
        });
        
        // Барная стойка
        const barMat = new THREE.MeshStandardMaterial({ color: 0xac8e68, roughness: 0.2 });
        const barCounter = new THREE.Mesh(new THREE.BoxGeometry(3, 0.9, 1.2), barMat);
        barCounter.position.set(3.2, 0.45, -2.2);
        barCounter.castShadow = true;
        scene.add(barCounter);
        
        // Стойка с вывеской
        const backWall = new THREE.Mesh(new THREE.BoxGeometry(8, 2.5, 0.2), new THREE.MeshStandardMaterial({ color: 0x5e3a1f }));
        backWall.position.set(0, 1.3, -3.5);
        backWall.receiveShadow = true;
        scene.add(backWall);
        
        // Динамическая вывеска (будет меняться в зависимости от ресторана)
        let signText = "🍕 PIZZA HOUSE";
        const signCanvas = document.createElement('canvas');
        const ctx = signCanvas.getContext('2d');
        signCanvas.width = 512;
        signCanvas.height = 256;
        const signTexture = new THREE.CanvasTexture(signCanvas);
        const signMat = new THREE.MeshStandardMaterial({ map: signTexture, emissive: 0x442200 });
        const signBoard = new THREE.Mesh(new THREE.BoxGeometry(2.5, 0.8, 0.1), signMat);
        signBoard.position.set(0, 2.1, -3.45);
        scene.add(signBoard);
        
        function updateSign(text) {
            ctx.fillStyle = "#1e1a0c";
            ctx.fillRect(0, 0, signCanvas.width, signCanvas.height);
            ctx.font = "Bold 48px 'Segoe UI'";
            ctx.fillStyle = "#ffc857";
            ctx.shadowBlur = 8;
            ctx.fillText(text, 60, 120);
            ctx.font = "32px 'Segoe UI'";
            ctx.fillStyle = "#ffaa33";
            ctx.fillText("★ РЕСТОРАН ★", 140, 200);
            signTexture.needsUpdate = true;
        }
        
        // Парящие частицы (атмосфера)
        const particleCount = 300;
        const particlesGeometry = new THREE.BufferGeometry();
        const particlePositions = new Float32Array(particleCount * 3);
        for (let i = 0; i < particleCount; i++) {
            particlePositions[i*3] = (Math.random() - 0.5) * 12;
            particlePositions[i*3+1] = Math.random() * 3.5;
            particlePositions[i*3+2] = (Math.random() - 0.5) * 8 - 1;
        }
        particlesGeometry.setAttribute('position', new THREE.BufferAttribute(particlePositions, 3));
        const particleMat = new THREE.PointsMaterial({ color: 0xffaa66, size: 0.05, transparent: true, opacity: 0.5 });
        const particles = new THREE.Points(particlesGeometry, particleMat);
        scene.add(particles);
        
        // Анимация камеры (лёгкое покачивание)
        let time = 0;
        
        // ---------- БИЗНЕС ЛОГИКА (JS) ----------
        let money = 5000;
        let level = 1;
        let customers = 0;
        let baseIncome = 1.2; // $ в секунду за гостя
        let incomeMultiplier = 1.0;
        let currentRestaurant = "pizza"; // pizza, sushi, burger
        let orderEffect = 1.0;
        let adEffect = 1.0;
        
        // Элементы интерфейса
        const moneySpan = document.getElementById('moneyDisplay');
        const levelSpan = document.getElementById('levelDisplay');
        const customersSpan = document.getElementById('customersDisplay');
        const incomeSpan = document.getElementById('incomePerSec');
        const phoneModal = document.getElementById('phoneModal');
        const notificationDiv = document.getElementById('notification');
        
        function showNotify(msg, isGood=true) {
            notificationDiv.style.opacity = "1";
            notificationDiv.style.animation = "none";
            notificationDiv.innerText = msg;
            notificationDiv.style.background = isGood ? "#2e7d64" : "#aa5544";
            setTimeout(() => {
                notificationDiv.style.animation = "fadeOut 2s forwards";
            }, 50);
            setTimeout(() => {
                notificationDiv.style.opacity = "0";
            }, 2000);
        }
        
        function updateUI() {
            moneySpan.innerText = Math.floor(money);
            levelSpan.innerText = level;
            let guestBase = Math.floor(12 + level * 4 + (adEffect * 5));
            customers = Math.max(5, Math.min(45, guestBase));
            customersSpan.innerText = customers;
            let totalIncome = baseIncome * customers * incomeMultiplier * orderEffect;
            incomeSpan.innerText = totalIncome.toFixed(1);
        }
        
        // Игровой цикл дохода раз в секунду
        setInterval(() => {
            let income = baseIncome * customers * incomeMultiplier * orderEffect;
            money += income;
            if(money < 0) money = 0;
            updateUI();
        }, 1000);
        
        // Вспомогательная функция изменения вывески и стиля ресторана (цветовая гамма)
        function setRestaurantTheme(type) {
            currentRestaurant = type;
            if(type === "pizza") {
                updateSign("🍕 PIZZA PARADISE");
                scene.background.setHex(0x1a0c0a);
                fillLight.color.setHex(0xcc8866);
            } else if(type === "sushi") {
                updateSign("🍣 SUSHI MASTER");
                scene.background.setHex(0x0a1a1f);
                fillLight.color.setHex(0x88aacc);
            } else if(type === "burger") {
                updateSign("🍔 BURGER KINGDOM");
                scene.background.setHex(0x2a1a0a);
                fillLight.color.setHex(0xcc9966);
            }
        }
        
        // Выбор ресторана при старте
        document.getElementById('selectPizza').onclick = () => {
            currentRestaurant = "pizza";
            setRestaurantTheme("pizza");
            document.getElementById('restoSelector').style.display = 'none';
            showNotify("🍕 Пиццерия открыта! Нанимайте персонал через телефон.", true);
            updateUI();
        };
        document.getElementById('selectSushi').onclick = () => {
            currentRestaurant = "sushi";
            setRestaurantTheme("sushi");
            document.getElementById('restoSelector').style.display = 'none';
            showNotify("🍣 Суши-бар готов к приему гостей!", true);
            updateUI();
        };
        document.getElementById('selectBurger').onclick = () => {
            currentRestaurant = "burger";
            setRestaurantTheme("burger");
            document.getElementById('restoSelector').style.display = 'none';
            showNotify("🍔 Бургерная ждет посетителей!", true);
            updateUI();
        };
        
        // Телефон модальное окно
        const phoneBtn = document.getElementById('phoneButton');
        phoneBtn.onclick = () => {
            phoneModal.style.display = 'block';
        };
        document.getElementById('closeModalBtn').onclick = () => {
            phoneModal.style.display = 'none';
        };
        
        // Действия в телефоне
        document.getElementById('upgradeLevelBtn').onclick = () => {
            let cost = 2500 + (level-1)*800;
            if(money >= cost && level < 8) {
                money -= cost;
                level++;
                incomeMultiplier = 1 + (level-1)*0.15;
                showNotify(`✨ Улучшено до ${level} уровня! Доход +15%`, true);
                updateUI();
            } else {
                showNotify("❌ Не хватает денег или максимальный уровень!", false);
            }
            phoneModal.style.display = 'none';
        };
        
        document.getElementById('orderSuppliesBtn').onclick = () => {
            if(money >= 800) {
                money -= 800;
                orderEffect = 1.35;  // временный бафф на 45 секунд
                showNotify("🚚 Свежие ингредиенты! +35% к доходу на 45 секунд", true);
                setTimeout(() => {
                    orderEffect = 1.0;
                    showNotify("🍽 Эффект доставки закончился", false);
                    updateUI();
                }, 45000);
                updateUI();
            } else {
                showNotify("Недостаточно средств для заказа!", false);
            }
            phoneModal.style.display = 'none';
        };
        
        document.getElementById('advertisingBtn').onclick = () => {
            if(money >= 1200) {
                money -= 1200;
                adEffect = 1.3;
                showNotify("📢 Рекламная кампания! +30% гостей на 60 секунд", true);
                setTimeout(() => {
                    adEffect = 1.0;
                    showNotify("📉 Реклама закончилась", false);
                    updateUI();
                }, 60000);
                updateUI();
            } else {
                showNotify("Нужно 1200$ на рекламу!", false);
            }
            phoneModal.style.display = 'none';
        };
        
        document.getElementById('sellBusinessBtn').onclick = () => {
            let sellValue = 10000 + level * 1200;
            money += sellValue;
            showNotify(`💸 Бизнес продан за ${sellValue}$! Инвесторы довольны.`, true);
            updateUI();
            phoneModal.style.display = 'none';
        };
        
        // Вспомогательная функция для имитации гостей на 3D (появление маленьких сфер)
        const guestGroup = new THREE.Group();
        scene.add(guestGroup);
        const guestMeshes = [];
        for(let i=0;i<25;i++) {
            const guest = new THREE.Mesh(new THREE.SphereGeometry(0.18, 12,12), new THREE.MeshStandardMaterial({ color: 0xf0c0a0, emissive: 0x442200 }));
            guest.userData = { speed: 0.002 + Math.random()*0.003, offsetX: (Math.random() - 0.5)*5, offsetZ: (Math.random() - 0.5)*4 };
            guestGroup.add(guest);
            guestMeshes.push(guest);
        }
        
        // Цветные блики на стенах
        const spotLight = new THREE.SpotLight(0xffaa66, 0.5);
        spotLight.position.set(1, 2.5, 2);
        scene.add(spotLight);
        
        // --- Анимация, смена гостей в зависимости от кол-ва
        function animateGuests() {
            const activeCount = Math.min(customers, guestMeshes.length);
            for(let i=0;i<guestMeshes.length;i++) {
                if(i < activeCount) {
                    guestMeshes[i].visible = true;
                    let t = Date.now() * guestMeshes[i].userData.speed;
                    let x = Math.sin(t + i) * 1.2 + (i%3 -1)*1.2;
                    let z = Math.cos(t*0.8 + i) * 0.8 - 0.5 + (Math.floor(i/4)*1.2);
                    guestMeshes[i].position.set(x, 0.15, z);
                } else {
                    guestMeshes[i].visible = false;
                }
            }
        }
        
        // Запуск рендера + Pyodide (не обязателен, но оставим для расширения. Используем просто Three)
        // Pyodide можно активировать для расширенных вычислений, но в данной игре он не критичен, пусть будет загружен для вида.
        async function loadPyodideAndStuff() {
            let pyodide = await loadPyodide();
            await pyodide.runPythonAsync(`
import js
print("Pyodide активен! Можем расширять игру на Python")
            `);
            console.log("Pyodide готов, но основная логика на JS");
        }
        loadPyodideAndStuff().catch(e=>console.warn);
        
        // Рендер цикл
        function animate() {
            requestAnimationFrame(animate);
            time += 0.008;
            // легкое движение камеры для живости
            camera.position.x += (Math.sin(time*0.2)*0.05 - (camera.position.x-5))*0.02;
            camera.position.z += (Math.cos(time*0.17)*0.03 - (camera.position.z-6))*0.02;
            camera.lookAt(0, 1.2, 0);
            
            particles.rotation.y += 0.002;
            animateGuests();
            updateUI(); // часто обновляем гостей
            renderer.render(scene, camera);
        }
        
        animate();
        
        // Адаптация окна
        window.addEventListener('resize', onWindowResize, false);
        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }
        
        // Начальный UI
        updateUI();
        setRestaurantTheme("pizza");
        
        // Небольшой стартовый бонус через 2 секунды
        setTimeout(() => {
            showNotify("💡 Совет: нажмите 'МЕНЕДЖЕР' для развития бизнеса!", true);
        }, 2000);
    </script>
</body>
</html>
